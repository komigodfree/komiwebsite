<div class="newsletter-block" id="newsletter">
  <div class="newsletter-label">Newsletter technique</div>
  <h2 class="newsletter-title" id="newsletter-title">
    Restez à la pointe de l'ingénierie IT
  </h2>
  <p class="newsletter-description">
    Nouveaux labs, veille technique, retours d'expérience production.
    Zéro spam. Double opt-in. Désinscription en un clic.
  </p>
  <form class="newsletter-form" action="#" method="POST" novalidate aria-labelledby="newsletter-title">
    <label for="newsletter-email" class="sr-only">Adresse email professionnelle</label>
    <input
      type="email"
      id="newsletter-email"
      name="email"
      class="newsletter-input"
      placeholder="votre@email.com"
      required
      autocomplete="email"
      aria-required="true"
    >
    <button type="submit" class="btn btn-primary">
      S'abonner
    </button>
  </form>
  <p class="newsletter-privacy">
    Vos données ne sont jamais vendues. Conformité RGPD.
    <a href="/confidentialite/">Politique de confidentialité</a>.
  </p>
</div>
