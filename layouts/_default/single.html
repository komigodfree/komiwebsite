{{ define "main" }}
<div class="container container--content">
  <article>
    <header style="margin-bottom:var(--space-8);padding-bottom:var(--space-6);border-bottom:1px solid var(--color-border)">
      <h1 style="margin-top:0">{{ .Title }}</h1>
      {{ with .Description }}<p style="color:var(--color-text-secondary);font-size:var(--text-lg)">{{ . }}</p>{{ end }}
      {{ if not .Date.IsZero }}
      <time datetime="{{ .Date.Format "2006-01-02" }}" style="font-size:var(--text-xs);color:var(--color-text-muted);font-family:var(--font-mono)">
        {{ .Date.Format "02 Jan 2006" }}
      </time>
      {{ end }}
    </header>
    <div class="lab-content">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
